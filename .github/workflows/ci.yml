name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Backend tests (blocking) ─────────────────────────────────────────────
  # 269 vitest tests run on Prisma mocks — no real DB required.
  backend-tests:
    name: Backend Tests (Bun / Vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.10'

      - name: Install dependencies
        run: bun install

      - name: Run tests
        run: bun run test

  # ── Backend typecheck (baseline — continue-on-error) ─────────────────────
  # 164 TS errors present locally (Hono context typings). Non-blocking until cleaned up.
  backend-typecheck:
    name: Backend Typecheck (baseline)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.10'

      - name: Install dependencies
        run: bun install

      - name: Typecheck
        run: npx tsc --noEmit
        continue-on-error: true

  # ── Frontend typecheck (strict — blocking) ───────────────────────────────
  # Vue 3 + Vite root. tsc --noEmit exits 0 locally.
  frontend-typecheck:
    name: Frontend Typecheck (strict)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Typecheck
        run: npx tsc --noEmit
