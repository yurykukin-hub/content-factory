services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: contentfactory
      POSTGRES_USER: contentfactory
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal

  backend:
    build: ./backend
    restart: unless-stopped
    ports:
      - "3800:3800"
    environment:
      DATABASE_URL: postgresql://contentfactory:${DB_PASSWORD}@postgres:5432/contentfactory
      JWT_SECRET: ${JWT_SECRET}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      NODE_ENV: production
      PORT: 3800
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      - postgres
    networks:
      - internal

volumes:
  postgres_data:
  uploads_data:

networks:
  internal:
